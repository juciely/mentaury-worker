version: "3.8"

services:
  mentaury-worker:
    build: .
    container_name: mentaury-worker
    restart: unless-stopped
    ports:
      - "3020:3020"
    env_file:
      - .env
    volumes:
      - ./temp_audio:/app/temp_audio
    mem_limit: 4g
    cpus: "3"
```

